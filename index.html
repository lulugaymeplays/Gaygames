<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMBAT SLINGSHOT | MAYHEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Shojumaru&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b0000;
            --gold: #d4af37;
            --bg: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Metal Mania', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.5);
            position: relative;
        }

        #ui-overlay {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 100;
        }

        .hud-text {
            font-size: 24px;
            color: var(--gold);
            text-shadow: 2px 2px 0px #000;
        }
    </style>
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-wrapper">
        <div id="ui-overlay">
            <div id="turn-indicator" class="hud-text">PREPARING...</div>
            <div id="timer" class="hud-text">15s</div>
        </div>
        <div id="phaser-game"></div>
    </div>
    <!-- Single game file to avoid module/CORS issues -->
    <script src="js/game.js"></script>
</body>

</html>
